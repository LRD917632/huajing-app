<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花净 - 用户反馈</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --primary-color: #4CAF50;
            --primary-light: #E8F5E9;
            --primary-dark: #2E7D32;
            --secondary-color: #FF7043;
            --accent-purple: #7E57C2;
            --text-primary: #333;
            --text-secondary: #666;
            --text-muted: #999;
            --card-bg: #ffffff;
            --border-color: rgba(76, 175, 80, 0.1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f0f7f4 0%, #e8f5e9 100%);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }

        .main-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
        }

        .header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 32px;
            color: var(--primary-dark);
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 15px;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto;
        }

        .feedback-section {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 30px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--primary-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 2px;
        }

        .rating-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: var(--primary-light);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .rating-item:hover {
            background: rgba(76, 175, 80, 0.15);
            transform: translateX(4px);
        }

        .rating-label {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
        }

        .rating-stars {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rating-input {
            width: 100px;
            height: 40px;
            text-align: center;
            border: 2px solid rgba(76, 175, 80, 0.2);
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-dark);
            transition: all 0.3s ease;
            background: white;
        }

        .rating-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        .rating-input::-webkit-inner-spin-button,
        .rating-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .rating-input[type=number] {
            -moz-appearance: textfield;
        }

        .rating-value {
            font-size: 14px;
            color: var(--text-muted);
            min-width: 24px;
        }

        .comment-section {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 30px;
            margin-bottom: 24px;
        }

        .comment-label {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: block;
        }

        .comment-textarea {
            width: 100%;
            height: 150px;
            padding: 16px;
            border: 2px solid rgba(76, 175, 80, 0.2);
            border-radius: var(--radius-md);
            font-size: 15px;
            font-family: inherit;
            color: var(--text-primary);
            resize: vertical;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .comment-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        .comment-textarea::placeholder {
            color: var(--text-muted);
        }

        .char-count {
            text-align: right;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .submit-section {
            text-align: center;
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 16px;
            font-weight: 600;
            border-radius: var(--radius-xl);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(76, 175, 80, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(76, 175, 80, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .success-message {
            display: none;
            background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
            border: 2px solid var(--primary-color);
            border-radius: var(--radius-md);
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
        }

        .success-message.show {
            display: block;
        }

        .success-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .success-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 8px;
        }

        .success-desc {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-item {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .nav-item:hover {
            background: white;
            color: var(--primary-color);
            transform: translateY(-2px);
        }

        .nav-item.active {
            background: var(--primary-color);
            color: white;
        }

        @media (max-width: 600px) {
            body {
                padding: 20px 12px;
            }

            .header h1 {
                font-size: 24px;
            }

            .feedback-section,
            .comment-section {
                padding: 20px;
            }

            .rating-item {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .rating-stars {
                width: 100%;
                justify-content: space-between;
            }

            .rating-input {
                width: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="nav-bar">
            <a href="index.html" class="nav-item">首页</a>
            <a href="plants_new.html" class="nav-item">植物图鉴</a>
            <a href="garden-diy.html" class="nav-item">简创花境</a>
            <a href="pet-diary.html" class="nav-item">养宠日记</a>
            <a href="profile.html" class="nav-item">个人中心</a>
            <a href="feedback.html" class="nav-item active">用户反馈</a>
        </div>

        <div class="header">
            <h1>🌸 用户反馈</h1>
            <p>感谢您使用花净APP！您的宝贵意见是我们改进的动力，请对各功能模块进行评分并留下您的建议。</p>
        </div>

        <div class="success-message" id="successMessage">
            <div class="success-icon">✅</div>
            <div class="success-title">反馈提交成功！</div>
            <div class="success-desc">感谢您的反馈，我们会认真听取每一条建议，不断完善花净APP。</div>
        </div>

        <div class="feedback-section">
            <div class="section-title">功能模块评分</div>
            
            <div class="rating-item">
                <span class="rating-label">🌳 植物图鉴模块</span>
                <div class="rating-stars">
                    <input type="number" class="rating-input" id="ratingPlants" min="1" max="100" value="80">
                    <span class="rating-value">分</span>
                </div>
            </div>

            <div class="rating-item">
                <span class="rating-label">🎨 简创花境模块</span>
                <div class="rating-stars">
                    <input type="number" class="rating-input" id="ratingGarden" min="1" max="100" value="80">
                    <span class="rating-value">分</span>
                </div>
            </div>

            <div class="rating-item">
                <span class="rating-label">📝 养护日记模块</span>
                <div class="rating-stars">
                    <input type="number" class="rating-input" id="ratingDiary" min="1" max="100" value="80">
                    <span class="rating-value">分</span>
                </div>
            </div>

            <div class="rating-item">
                <span class="rating-label">✨ 整体使用体验</span>
                <div class="rating-stars">
                    <input type="number" class="rating-input" id="ratingOverall" min="1" max="100" value="80">
                    <span class="rating-value">分</span>
                </div>
            </div>
        </div>

        <div class="comment-section">
            <div class="section-title">留言反馈</div>
            <label class="comment-label">请告诉我们您的建议、意见或遇到的问题：</label>
            <textarea class="comment-textarea" id="commentText" placeholder="您的反馈对我们非常重要，请详细描述您的想法..."></textarea>
            <div class="char-count" id="charCount">0/500</div>
        </div>

        <div class="submit-section">
            <button class="submit-btn" onclick="submitFeedback()">提交反馈</button>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('commentText');
        const charCount = document.getElementById('charCount');

        textarea.addEventListener('input', function() {
            const length = this.value.length;
            charCount.textContent = length + '/500';
            
            if (length > 500) {
                this.value = this.value.substring(0, 500);
                charCount.textContent = '500/500';
            }
        });

        const ratingInputs = document.querySelectorAll('.rating-input');
        ratingInputs.forEach(input => {
            input.addEventListener('input', function() {
                let value = parseInt(this.value);
                if (isNaN(value)) value = 50;
                if (value < 1) value = 1;
                if (value > 100) value = 100;
                this.value = value;
            });
        });

        function submitFeedback() {
            const feedback = {
                plants: parseInt(document.getElementById('ratingPlants').value),
                garden: parseInt(document.getElementById('ratingGarden').value),
                diary: parseInt(document.getElementById('ratingDiary').value),
                overall: parseInt(document.getElementById('ratingOverall').value),
                comment: document.getElementById('commentText').value,
                timestamp: new Date().toISOString()
            };

            const feedbacks = JSON.parse(localStorage.getItem('feedbacks') || '[]');
            feedbacks.push(feedback);
            localStorage.setItem('feedbacks', JSON.stringify(feedbacks));

            document.getElementById('successMessage').classList.add('show');
            
            ratingInputs.forEach(input => {
                input.value = 80;
            });
            textarea.value = '';
            charCount.textContent = '0/500';

            setTimeout(() => {
                document.getElementById('successMessage').classList.remove('show');
            }, 5000);
        }
    </script>
</body>
</html>
